{% extends "base.html" %}

{% block titulo %}Página Inicial{% endblock %}

{% block conteudo %}
    <a href="{{ url_for('login') }}">Login</a>

    {% if usuario_logado %}
    <h1>
        Bem-vindo(a), {{ pessoa.nome }}
    </h1>
    <ul>
        {% for p in pessoa.produtos %}
            <li>{{ p }}</li>
        {% endfor %}
    </ul>
    {% else %}
        <h1>Faça o login para continuar</h1>
    {% endif %}
{% endblock%}
